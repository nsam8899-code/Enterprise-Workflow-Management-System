<!DOCTYPE html>
<html>
<head>
    <title>Departments</title>
</head>
<body>
    <h1>Departments</h1>
    <p><a href="{% url 'department_create' %}">+ New Department</a></p>
    <p><a href="{% url 'dashboard' %}">Back to Dashboard</a></p>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for dept in departments %}
            <tr>
                <td>{{ dept.name }}</td>
                <td>
                    <a href="{% url 'department_edit' dept.pk %}">Edit</a> | 
                    <a href="{% url 'department_delete' dept.pk %}">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No departments found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
