<!DOCTYPE html>
<html>
<head>
    <title>Delete Department</title>
</head>
<body>
    <h1>Delete Department</h1>
    <p>Are you sure you want to delete the department "{{ department.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>
    <p><a href="{% url 'department_list' %}">Cancel</a></p>
</body>
</html>
