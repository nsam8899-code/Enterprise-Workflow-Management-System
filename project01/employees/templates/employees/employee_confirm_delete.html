<!DOCTYPE html>
<html>
<head>
    <title>Delete Employee</title>
</head>
<body>
    <h1>Delete Employee</h1>
    <p>Are you sure you want to delete the employee "{{ employee.name }}" ({{ employee.employee_id }})?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>
    <p><a href="{% url 'employee_list' %}">Cancel</a></p>
</body>
</html>
